<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Administración" />
    <meta name="theme-color" content="#060b1d" />
    <title>Inicio - Panel de administración</title>
    <link rel="icon" type="image/png" href="./img/favicon.png" />
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        color: #f6f7ff;
        font-family: "Syne", "Segoe UI", Roboto, Arial, sans-serif;
        background-color: #060b1d;
        background-image: linear-gradient(140deg, rgba(0, 0, 0, 0.96) 0%, rgba(17, 17, 17, 0.86) 55%, rgba(0, 0, 0, 0.96) 100%), url("./img/background.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .home-shell {
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        padding: 0;
      }

      .home-phone {
        width: 100%;
        min-height: 100vh;
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
        position: relative;
        overflow: hidden;
        backdrop-filter: none;
      }

      .home-phone::before {
        content: none;
      }

      .home-card {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        backdrop-filter: none;
      }

      .home-card + .home-card {
        margin-top: 0;
      }

      .home-hero {
        padding: 1.5rem 1.2rem 0.8rem;
        text-align: center;
      }

      .home-eyebrow {
        margin: 0 0 0.4rem;
        font-size: 0.8rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 700;
      }

      .home-title {
        margin: 0;
        font-size: clamp(1.4rem, 3.2vw, 2rem);
        font-weight: 800;
        line-height: 1.1;
      }

      .home-subtitle {
        margin: 0.45rem 0 0;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.5;
      }

      .home-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.2rem;
        width: 100%;
        height: 100%;
        padding: 1.5rem 1.2rem;
        box-sizing: border-box;
      }

      .home-link,
      .link-pill {
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1;
        width: 100%;
        min-height: 0;
        padding: 1rem;
        border-radius: 16px;
        text-decoration: none;
        color: #f7f8fe;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
        border: 2px solid;
        border-color: rgba(212, 175, 55, 0.6);
        box-shadow: 
          0 0 25px rgba(212, 175, 55, 0.35),
          inset 0 0 20px rgba(100, 180, 255, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .home-link::before,
      .link-pill::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 70%);
        pointer-events: none;
      }

      .home-link:hover,
      .home-link:focus-visible,
      .link-pill:hover,
      .link-pill:focus-visible {
        transform: translateY(-4px);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
        border-color: rgba(212, 175, 55, 0.8);
        box-shadow: 
          0 0 40px rgba(212, 175, 55, 0.6),
          inset 0 0 30px rgba(100, 180, 255, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      .home-link--landing {
        background: linear-gradient(135deg, rgba(138, 43, 226, 0.35), rgba(75, 0, 130, 0.25));
        border-color: rgba(200, 100, 255, 0.8);
        box-shadow: 
          0 0 25px rgba(200, 100, 255, 0.4),
          inset 0 0 20px rgba(138, 43, 226, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .home-link--landing:hover {
        background: linear-gradient(135deg, rgba(138, 43, 226, 0.5), rgba(75, 0, 130, 0.35));
        border-color: rgba(200, 100, 255, 1);
        box-shadow: 
          0 0 40px rgba(200, 100, 255, 0.65),
          inset 0 0 30px rgba(138, 43, 226, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      .landing-text {
        position: relative;
        z-index: 1;
        font-weight: 700;
        font-size: 0.9rem;
        line-height: 1.2;
        text-align: center;
        letter-spacing: 0.05em;
      }

      .home-link .icon-bubble {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: clamp(4.8rem, 12vw, 7.2rem);
        height: clamp(4.8rem, 12vw, 7.2rem);
        font-size: clamp(2.8rem, 7vw, 4.4rem);
        line-height: 1;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
      }

      .home-link .icon-image {
        position: relative;
        z-index: 1;
        max-width: clamp(8rem, 20vw, 12rem);
        max-height: clamp(8rem, 20vw, 12rem);
        width: auto;
        height: auto;
        object-fit: contain;
        object-position: center;
      }

      .link-pill .alt-emoji {
        position: relative;
        z-index: 1;
        font-size: clamp(2.4rem, 5.6vw, 3.4rem);
        line-height: 1;
        display: inline-block;
        margin: 0;
        transform: none;
      }

      .link-pill .alt-number {
        position: relative;
        z-index: 1;
        font-size: clamp(1.05rem, 2vw, 1.35rem);
        line-height: 1.1;
        font-weight: 800;
        display: inline-block;
        color: rgba(255, 255, 255, 0.9);
      }

      .link-list {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0.75rem;
        width: 100%;
        padding: 1.2rem;
        box-sizing: border-box;
      }

      .link-pill {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.3rem;
        min-height: 8rem;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
        padding: 0.8rem 1rem;
        border: 2px solid rgba(100, 180, 255, 0.6);
        box-shadow: 
          0 0 20px rgba(100, 180, 255, 0.3),
          inset 0 0 15px rgba(100, 180, 255, 0.08);
      }
      
      .link-pill:hover,
      .link-pill:focus-visible {
        border-color: rgba(100, 180, 255, 0.9);
        box-shadow: 
          0 0 30px rgba(100, 180, 255, 0.5),
          inset 0 0 20px rgba(100, 180, 255, 0.12);
      }

      .home-footer {
        padding: 0 1.2rem 1.2rem;
      }

      .home-footer__text {
        margin: 0;
        text-align: center;
        font-size: 0.8rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.68);
      }

      .home-section-label {
        padding: 0 1.2rem 0.45rem;
        margin: 0;
        text-align: center;
        font-size: 0.86rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }

      @media (max-width: 900px) {
        .link-list {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .home-phone {
          padding: 14px;
          border-radius: 28px;
        }

        .home-hero {
          padding: 1.25rem 0.75rem 0.7rem;
        }

        .home-title {
          font-size: 1.3rem;
        }

        .home-subtitle {
          font-size: 0.9rem;
        }

        .link-list {
          grid-template-columns: 1fr;
          gap: 0.65rem;
          padding: 0.9rem 1rem 1.2rem;
        }

        .link-pill {
          min-height: 7rem;
          border-radius: 18px;
          flex-direction: column;
          align-items: center;
          gap: 0.2rem;
          padding: 0.9rem 1rem;
        }

        .home-footer {
          padding: 0 1rem 1rem;
        }
      }

      /* Blob Background Animation */
      .blob-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .blob {
        position: absolute;
        filter: blur(80px);
        opacity: 0.3;
      }

      .blob-1 {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle at 30% 40%, rgba(100, 180, 255, 1), rgba(100, 180, 255, 0.15) 70%);
        border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
        top: -20%;
        left: -10%;
        animation: blob-float-1 8s ease-in-out infinite;
      }

      .blob-2 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle at 30% 40%, rgba(138, 43, 226, 0.8), rgba(138, 43, 226, 0.1) 70%);
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        top: 50%;
        right: -5%;
        animation: blob-float-2 10s ease-in-out infinite;
      }

      .blob-3 {
        width: 350px;
        height: 350px;
        background: radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.7), rgba(212, 175, 55, 0.1) 70%);
        border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        bottom: -10%;
        left: 40%;
        animation: blob-float-3 12s ease-in-out infinite;
      }

      @keyframes blob-float-1 {
        0%, 100% {
          transform: translate(0, 0) rotate(0deg);
        }
        25% {
          transform: translate(80px, -120px) rotate(90deg);
        }
        50% {
          transform: translate(-100px, 80px) rotate(180deg);
        }
        75% {
          transform: translate(-120px, -100px) rotate(270deg);
        }
      }

      @keyframes blob-float-2 {
        0%, 100% {
          transform: translate(0, 0) rotate(0deg);
        }
        25% {
          transform: translate(-100px, 90px) rotate(-90deg);
        }
        50% {
          transform: translate(110px, -120px) rotate(-180deg);
        }
        75% {
          transform: translate(90px, 100px) rotate(-270deg);
        }
      }

      @keyframes blob-float-3 {
        0%, 100% {
          transform: translate(0, 0) rotate(0deg);
        }
        33% {
          transform: translate(120px, -80px) rotate(120deg);
        }
        66% {
          transform: translate(-110px, 100px) rotate(240deg);
        }
      }

      main {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body class="settings-page">
    <div class="blob-container">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <main class="home-shell">
      <div class="home-phone">
        <section class="home-card" aria-labelledby="home-title">
          <div class="home-hero">
            <p class="home-eyebrow">Panel rápido</p>
            <h1 class="home-title">Accedé a tus secciones</h1>
            <p class="home-subtitle">Elegí la herramienta que necesites en un solo toque.</p>
          </div>
          <p class="home-section-label">Acciones rápidas</p>
          <div class="home-actions">
            <a class="home-link" href="./settings.html" aria-label="Configuración"><img src="./img/buttons/Settings.png" alt="Configuración" class="icon-image"></a>
            <a class="home-link" href="./analytics.html" aria-label="Analytics"><img src="./img/buttons/Analytics.png" alt="Analytics" class="icon-image"></a>
            <a class="home-link home-link--landing" href="https://landing-vip24hs.vercel.app" target="_blank" rel="noopener noreferrer" aria-label="Landing"><img src="./img/buttons/Landing.png" alt="Landing" class="icon-image"></a>
            <a class="home-link" href="#" aria-label="Más"><img src="./img/buttons/VIP.png" alt="VIP" class="icon-image"></a>
          </div>
        </section>

        <section class="home-card" aria-labelledby="alt-links-title">
          <p class="home-section-label">Links alternativos</p>
          <div class="link-list" id="alt-link-list"></div>
        </section>
      </div>
    </main>

    <script>
      const alternateLinks = [
        { number: 1, url: 'https://landing-vip24hs.vercel.app/?src=alt1' },
        { number: 2, url: 'https://landing-vip24hs.vercel.app/?src=alt2' },
        { number: 3, url: 'https://landing-vip24hs.vercel.app/?src=alt3' },
        { number: 4, url: 'https://landing-vip24hs.vercel.app/?src=alt4' },
        { number: 5, url: 'https://landing-vip24hs.vercel.app/?src=alt5' }
      ];

      const linkList = document.getElementById('alt-link-list');
      if (linkList) {
        linkList.innerHTML = alternateLinks
          .map((link) => `
            <a class="link-pill" href="${link.url}" target="_blank" rel="noopener noreferrer">
              <span class="alt-emoji">🌐</span>
              <span class="alt-number">${link.number}</span>
            </a>
          `)
          .join('');
      }
    </script>
  </body>
</html>
