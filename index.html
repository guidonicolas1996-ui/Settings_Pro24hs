<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Landing profesional con acceso VIP y llamado a WhatsApp." />
    <meta name="theme-color" content="#060b1d" />
    <title>Casino Oficial - Acceso VIP</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="top-actions">
      <a href="./settings.html" aria-label="Configuración">⚙️</a>
      <a href="./analytics.html" aria-label="Analytics">📊</a>
    </div>
    <div class="ambient-layer" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="blob blob-3"></span>
      <span class="blob blob-4"></span>
      <span class="blob blob-5"></span>
    </div>

    <div class="page-shell">
      <header class="hero-header">
        <div class="brand-mark" aria-label="Marca principal">
          <img src="img/logo.png" alt="" class="brand-mark__image" ">
        </div>
        <img id="active-mascot" src="img/mascot.png" alt="" class="hero-header__mascot" />
        <p class="hero-header__badge" id="access-badge">ACCESO VIP</p>
      </header>

      <main class="main-content">
        <section class="hero-card" aria-labelledby="hero-title">
          <h1 id="hero-title">OBTENÉ UN <span class="gradient-text">100%</span> EN TU PRIMER DEPÓSITO</h1>
          <p id="hero-copy">Escribinos apretando el botón de abajo</span></span></p>

          <div class="hero-card__actions">
            <button type="button" class="whatsapp-button" id="whatsapp-button" aria-label="Abrir WhatsApp">
              <span class="button-aura"></span>
              <img src="img/whatsapp.png" alt="" aria-hidden="true" />
              <span id="cta-label">WHATSAPP OFICIAL</span>
            </button>
            <p class="helper-text" id="helper-text">ATENCIÓN Y RETIROS LAS 24 HS</p>
          </div>
        </section>

        <footer class="footer">
          <p id="footer-text1">Bono no extraíble, válido solo para slots. Mínimo de carga: $2.000.</p>
          <p id="footer-text2">© 2026 el juego es solo +18. Operá con responsabilidad.</p>
        </footer>
      </main>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
