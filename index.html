<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Administración" />
    <meta name="theme-color" content="#060b1d" />
    <title>Inicio - Panel de administración</title>
    <link rel="icon" type="image/png" href="./img/favicon.png" />
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        color: #f6f7ff;
        font-family: "Syne", "Segoe UI", Roboto, Arial, sans-serif;
        background-color: #060b1d;
        background-image: linear-gradient(140deg, rgba(0, 0, 0, 0.96) 0%, rgba(17, 17, 17, 0.86) 55%, rgba(0, 0, 0, 0.96) 100%), url("./img/background.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .home-shell {
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        padding: 0;
      }

      .home-phone {
        width: 100%;
        min-height: 100vh;
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
        position: relative;
        overflow: hidden;
        backdrop-filter: none;
      }

      .home-phone::before {
        content: none;
      }

      .home-card {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        backdrop-filter: none;
      }

      .home-card + .home-card {
        margin-top: 0;
      }

      .home-hero {
        padding: 1.5rem 1.2rem 0.8rem;
        text-align: center;
      }

      .home-eyebrow {
        margin: 0 0 0.4rem;
        font-size: 0.8rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        font-weight: 700;
      }

      .home-title {
        margin: 0;
        font-size: clamp(1.4rem, 3.2vw, 2rem);
        font-weight: 800;
        line-height: 1.1;
      }

      .home-subtitle {
        margin: 0.45rem 0 0;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.5;
      }

      .home-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        width: 100%;
        height: 100%;
        padding: 1.2rem;
        box-sizing: border-box;
      }

      .home-link,
      .link-pill {
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1;
        width: 100%;
        min-height: 0;
        padding: 1rem;
        border-radius: 28px;
        text-decoration: none;
        color: #f7f8fe;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.09);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
        transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      .home-link::before,
      .link-pill::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 70%);
        pointer-events: none;
      }

      .home-link:hover,
      .home-link:focus-visible,
      .link-pill:hover,
      .link-pill:focus-visible {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 24px 46px rgba(0, 0, 0, 0.28);
      }

      .home-link--landing {
        background: rgba(255, 20, 147, 0.2);
      }

      .home-link .icon-bubble {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: clamp(4.8rem, 12vw, 7.2rem);
        height: clamp(4.8rem, 12vw, 7.2rem);
        font-size: clamp(2.8rem, 7vw, 4.4rem);
        line-height: 1;
        border-radius: 50%;
        background: rgba(255,255,255,0.08);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
      }

      .link-pill .alt-emoji {
        position: relative;
        z-index: 1;
        font-size: clamp(2.4rem, 5.6vw, 3.4rem);
        line-height: 1;
        display: inline-block;
        margin-right: 0.4rem;
        transform: translateY(-1px);
      }

      .link-pill .alt-number {
        position: relative;
        z-index: 1;
        font-size: 1rem;
        line-height: 1;
        font-weight: 700;
        display: inline-block;
      }

      .link-list {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0.75rem;
        width: 100%;
        padding: 1.2rem;
        box-sizing: border-box;
      }

      .link-pill {
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.04);
      }

      .home-footer {
        padding: 0 1.2rem 1.2rem;
      }

      .home-footer__text {
        margin: 0;
        text-align: center;
        font-size: 0.8rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.68);
      }

      .home-section-label {
        padding: 0 1.2rem 0.45rem;
        margin: 0;
        text-align: center;
        font-size: 0.86rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }

      @media (max-width: 900px) {
        .link-list {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .home-phone {
          padding: 14px;
          border-radius: 28px;
        }

        .home-hero {
          padding: 1.25rem 0.75rem 0.7rem;
        }

        .home-title {
          font-size: 1.3rem;
        }

        .home-subtitle {
          font-size: 0.9rem;
        }

        .link-list {
          grid-template-columns: 1fr;
          gap: 0.65rem;
          padding: 0.9rem 1rem 1.2rem;
        }

        .link-pill {
          aspect-ratio: auto;
          min-height: 3.8rem;
          border-radius: 18px;
          flex-direction: row;
          align-items: center;
          gap: 0.7rem;
        }

        .home-footer {
          padding: 0 1rem 1rem;
        }
      }
    </style>
  </head>
  <body class="settings-page">
    <main class="home-shell">
      <div class="home-phone">
        <section class="home-card" aria-labelledby="home-title">
          <div class="home-hero">
            <p class="home-eyebrow">Panel rápido</p>
            <h1 class="home-title">Accedé a tus secciones</h1>
            <p class="home-subtitle">Elegí la herramienta que necesites en un solo toque.</p>
          </div>
          <p class="home-section-label">Acciones rápidas</p>
          <div class="home-actions">
            <a class="home-link" href="./settings.html" aria-label="Configuración"><span class="icon-bubble">⚙️</span></a>
            <a class="home-link" href="./analytics.html" aria-label="Analytics"><span class="icon-bubble">📊</span></a>
            <a class="home-link home-link--landing" href="https://landing-pro24hs.vercel.app" target="_blank" rel="noopener noreferrer" aria-label="Landing"><span class="icon-bubble">🌐</span></a>
            <a class="home-link" href="#" aria-label="Más"><span class="icon-bubble">💎</span></a>
          </div>
        </section>

        <section class="home-card" aria-labelledby="alt-links-title">
          <p class="home-section-label">Links alternativos</p>
          <div class="link-list" id="alt-link-list"></div>
        </section>
      </div>
    </main>

    <script>
      const alternateLinks = [
        { number: 1, url: 'https://landing-pro24hs.vercel.app/?src=alt1' },
        { number: 2, url: 'https://landing-pro24hs.vercel.app/?src=alt2' },
        { number: 3, url: 'https://landing-pro24hs.vercel.app/?src=alt3' },
        { number: 4, url: 'https://landing-pro24hs.vercel.app/?src=alt4' },
        { number: 5, url: 'https://landing-pro24hs.vercel.app/?src=alt5' }
      ];

      const linkList = document.getElementById('alt-link-list');
      if (linkList) {
        linkList.innerHTML = alternateLinks
          .map((link) => `
            <a class="link-pill" href="${link.url}" target="_blank" rel="noopener noreferrer">
              <span class="alt-emoji">🌐</span>
              <span class="alt-number">${link.number}</span>
            </a>
          `)
          .join('');
      }
    </script>
  </body>
</html>
