<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Landing profesional con acceso VIP y llamado a WhatsApp." />
    <meta name="theme-color" content="#060b1d" />
    <title>Casino Oficial - Acceso VIP</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="/js/main.js"></script>
  </head>
  <body>
    <div class="ambient-layer" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="blob blob-3"></span>
      <span class="blob blob-4"></span>
      <span class="blob blob-5"></span>
    </div>

    <div class="page-shell">
      <header class="hero-header">
        <div class="brand-mark" aria-label="Marca principal">
          <img id="active-logo" src="img/logo1.png" alt="Logo Ganamos" class="brand-mark__image" />
        </div>
        <img id="active-mascot" src="img/mascotG.png" alt="Mascota Ganamos" class="hero-header__mascot" />
        <p class="hero-header__badge" id="access-badge"></p>
      </header>

      <main class="main-content">
        <section class="hero-card" aria-labelledby="hero-title">
          <h1 id="hero-title"></h1>
          <p id="hero-copy"></p>

          <div class="hero-card__actions">
            <button type="button" class="whatsapp-button" id="whatsapp-button" aria-label="Abrir WhatsApp">
              <span class="button-aura"></span>
              <img src="img/whatsapp.png" alt="" aria-hidden="true" />
              <span id="cta-label"></span>
            </button>
            <p class="helper-text" id="helper-text"></p>
          </div>
        </section>

        <footer class="footer">
          <p id="footer-text"></p>
        </footer>
      </main>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
